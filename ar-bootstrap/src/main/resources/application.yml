# AR Bootstrap - multi-tenant backend
# Secrets: prefer env vars (see .env.example). Defaults are for local only.
quarkus:
  application:
    name: invoice-genie-ar
  http:
    port: ${QUARKUS_HTTP_PORT:8080}
    host: 0.0.0.0
  datasource:
    db-kind: postgresql
    username: ${QUARKUS_DATASOURCE_USERNAME:ar}
    password: ${QUARKUS_DATASOURCE_PASSWORD:ar}
    jdbc:
      url: ${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/invoicegenie}
      max-size: ${QUARKUS_DATASOURCE_JDBC_MAX_SIZE:32}
  hibernate-orm:
    database:
      generation: none
    log:
      sql: false
  flyway:
    migrate-at-start: ${QUARKUS_FLYWAY_MIGRATE_AT_START:true}
    baseline-on-migrate: true
    locations: db/migration
  index-dependency:
    ar-domain:
      group-id: com.invoicegenie
      artifact-id: ar-domain
    ar-adapter-api:
      group-id: com.invoicegenie
      artifact-id: ar-adapter-api
    ar-adapter-messaging:
      group-id: com.invoicegenie
      artifact-id: ar-adapter-messaging
    ar-adapter-persistence:
      group-id: com.invoicegenie
      artifact-id: ar-adapter-persistence
  # Kafka Dev Services off by default (no Docker required)
  kafka:
    devservices:
      enabled: false
  swagger-ui:
    always-include: true
  micrometer:
    export:
      prometheus:
        enabled: true
        path: /q/metrics
  otel:
    enabled: ${QUARKUS_OTEL_ENABLED:false}
    exporter:
      otlp:
        endpoint: ${QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  log:
    level: INFO
    category:
      "com.invoicegenie":
        level: DEBUG
      "org.jboss.resteasy.reactive.server.handlers":
        level: DEBUG
      "io.quarkus.arc":
        level: INFO
    console:
      enable: true
      # Keep plain text in non-prod; JSON only on %prod (quarkus-logging-json present)
      json: false
      format: "%d{HH:mm:ss.SSS} [%t] %-5p %c{2} - %s%e%n"
    file:
      enable: true
      path: logs/invoicegenie.log
      format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %c{2} - %s%e%n"
      rotation:
        max-file-size: 10M
        max-backup-index: 5

# API security (disabled by default for local/dev/test)
invoicegenie:
  security:
    enabled: ${INVOICEGENIE_SECURITY_ENABLED:false}
    mode: ${INVOICEGENIE_SECURITY_MODE:api-key}
    # Format: apiKey:tenantUuid,otherKey:otherTenantUuid
    api-keys: ${INVOICEGENIE_API_KEYS:none}
    jwt:
      secret: ${INVOICEGENIE_JWT_SECRET:none}
    allow-openapi: ${INVOICEGENIE_SECURITY_ALLOW_OPENAPI:true}

# Local / fast path: H2 in-memory (no Postgres required).
# Preferred: -Dquarkus.profile=dev
# Legacy alias: -Dquarkus.profile=sqlite (same parent config)
"%dev":
  quarkus:
    http:
      port: 8080
      host: 0.0.0.0
    datasource:
      db-kind: h2
      jdbc:
        url: jdbc:h2:mem:testdb
        driver: org.h2.Driver
        username: sa
        password: ""
    hibernate-orm:
      database:
        generation: update
    flyway:
      migrate-at-start: false
    kafka:
      devservices:
        enabled: false
    index-dependency:
      ar-domain:
        group-id: com.invoicegenie
        artifact-id: ar-domain
      ar-adapter-api:
        group-id: com.invoicegenie
        artifact-id: ar-adapter-api
      ar-adapter-messaging:
        group-id: com.invoicegenie
        artifact-id: ar-adapter-messaging
      ar-adapter-persistence:
        group-id: com.invoicegenie
        artifact-id: ar-adapter-persistence
      ar-application:
        group-id: com.invoicegenie
        artifact-id: ar-application
  invoicegenie:
    security:
      enabled: false

# Deprecated alias for %dev (historical name; not SQLite). Remove after one release cycle.
"%sqlite":
  quarkus:
    config:
      profile:
        parent: dev

# Test profile - uses H2 in-memory database
"%test":
  quarkus:
    http:
      port: 8080
      host: 0.0.0.0
    datasource:
      db-kind: h2
      jdbc:
        url: jdbc:h2:mem:testdb
        driver: org.h2.Driver
        username: sa
        password: ""
    hibernate-orm:
      database:
        generation: update
    flyway:
      migrate-at-start: false
    kafka:
      devservices:
        enabled: false
    devservices:
      enabled: false
    index-dependency:
      ar-domain:
        group-id: com.invoicegenie
        artifact-id: ar-domain
      ar-adapter-api:
        group-id: com.invoicegenie
        artifact-id: ar-adapter-api
      ar-adapter-messaging:
        group-id: com.invoicegenie
        artifact-id: ar-adapter-messaging
      ar-adapter-persistence:
        group-id: com.invoicegenie
        artifact-id: ar-adapter-persistence
      ar-application:
        group-id: com.invoicegenie
        artifact-id: ar-application
  invoicegenie:
    security:
      enabled: false

# Production profile: secrets required, Flyway on, OpenAPI locked down, auth on
"%prod":
  quarkus:
    hibernate-orm:
      database:
        generation: none
    flyway:
      migrate-at-start: true
      baseline-on-migrate: true
    swagger-ui:
      enable: false
      always-include: false
    smallrye-openapi:
      enable: false
    log:
      level: INFO
      category:
        "com.invoicegenie":
          level: INFO
      console:
        json: ${QUARKUS_LOG_CONSOLE_JSON:true}
      file:
        enable: false
  invoicegenie:
    security:
      enabled: true
      mode: ${INVOICEGENIE_SECURITY_MODE:api-key}
      allow-openapi: false

# Kafka connectors (optional - enable in production with Kafka running)
# Uncomment when Kafka is available AND outbox.kafka-enabled=true:
# mp.messaging.outgoing.invoice-issued:
#   connector: smallrye-kafka
#   topic: ar.invoice.issued
#   value.serializer: org.apache.kafka.common.serialization.StringSerializer

# mp.messaging.outgoing.outbox-events:
#   connector: smallrye-kafka
#   topic: ar.domain.events
#   value.serializer: org.apache.kafka.common.serialization.StringSerializer
#   key.serializer: org.apache.kafka.common.serialization.StringSerializer

# Transactional Outbox Configuration
outbox:
  enabled: true
  # When true, OutboxWorker uses OutboxKafkaSender if a CDI bean is present; else logs
  kafka-enabled: ${OUTBOX_KAFKA_ENABLED:false}
  batch-size: 100
  poll-interval: 5s
  delay-start: 10s
  cleanup-days: 7
  cleanup-cron: "0 0 0 * * ?"

# RLS: TenantFilter sets app.current_tenant_id via DbTenantContext.setTenantLocal(EntityManager)
# when Postgres is in use. On H2 the call is a graceful no-op.

# Idempotency retention (P2-06)
idempotency:
  retention-days: ${IDEMPOTENCY_RETENTION_DAYS:7}
  cleanup-enabled: true
  cleanup-cron: "0 30 0 * * ?"

# Overdue marking job (STORY-008)
overdue:
  marking:
    enabled: ${OVERDUE_MARKING_ENABLED:true}
    cron: ${OVERDUE_MARKING_CRON:0 15 1 * * ?}

# Kafka outbox publish (P1-03) — enable with OUTBOX_KAFKA_ENABLED=true
outbox.kafka.bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
outbox.kafka.topic: ${OUTBOX_KAFKA_TOPIC:ar.domain.events}
outbox.kafka.client-id: invoicegenie-outbox