# AR Bootstrap — multi-tenant backend
quarkus:
  application:
    name: invoice-genie-ar
  http:
    port: 8080
    host: 0.0.0.0
  datasource:
    db-kind: postgresql
    username: ar
    password: ar
    jdbc:
      url: jdbc:postgresql://localhost:5432/invoicegenie
      max-size: 32
  hibernate-orm:
    database:
      generation: none
    log:
      sql: false
  index-dependency:
    ar-adapter-api:
      group-id: com.invoicegenie
      artifact-id: ar-adapter-api
  log:
    level: INFO
    category:
      "com.invoicegenie":
        level: DEBUG
      "org.jboss.resteasy.reactive.server.handlers":
        level: DEBUG
      "io.quarkus.arc":
        level: INFO
    console:
      enable: true
      format: "%d{HH:mm:ss.SSS} [%t] %-5p %c{2} - %s%e%n"
    file:
      enable: true
      path: logs/invoicegenie.log
      format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %c{2} - %s%e%n"
      rotation:
        max-file-size: 10M
        max-backup-index: 5

"%sqlite":
  quarkus:
    http:
      port: 8080
      host: 0.0.0.0
    datasource:
      db-kind: h2
      jdbc:
        url: jdbc:h2:mem:testdb
        driver: org.h2.Driver
        username: sa
        password: ""
    hibernate-orm:
      database:
        generation: update
    index-dependency:
      ar-adapter-api:
        group-id: com.invoicegenie
        artifact-id: ar-adapter-api
      ar-application:
        group-id: com.invoicegenie
        artifact-id: ar-application

# Test profile - uses H2 in-memory database
"%test":
  quarkus:
    http:
      port: 8080
      host: 0.0.0.0
    datasource:
      db-kind: h2
      jdbc:
        url: jdbc:h2:mem:testdb
        driver: org.h2.Driver
        username: sa
        password: ""
    hibernate-orm:
      database:
        generation: update
    index-dependency:
      ar-adapter-api:
        group-id: com.invoicegenie
        artifact-id: ar-adapter-api

# Kafka (optional — disable if not used)
mp.messaging.outgoing.invoice-issued:
  connector: smallrye-kafka
  topic: ar.invoice.issued
  # value.serializer: org.apache.kafka.common.serialization.StringSerializer

# RLS: set per-request in filter before using connection
# app.current_tenant_id is set by TenantFilter or a dedicated DbTenantInterceptor

