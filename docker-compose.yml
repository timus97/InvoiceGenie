# Production-oriented compose (use with .env — never commit real secrets)
#   cp .env.example .env
#   docker compose up -d --build
#
# Arena/eval image remains in Dockerfile.arena for sandbox use only.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "${QUARKUS_HTTP_PORT:-8080}:8080"
    environment:
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-prod}
      QUARKUS_DATASOURCE_JDBC_URL: ${QUARKUS_DATASOURCE_JDBC_URL:-jdbc:postgresql://postgres:5432/invoicegenie}
      QUARKUS_DATASOURCE_USERNAME: ${QUARKUS_DATASOURCE_USERNAME:-ar}
      QUARKUS_DATASOURCE_PASSWORD: ${QUARKUS_DATASOURCE_PASSWORD:?set QUARKUS_DATASOURCE_PASSWORD in .env}
      INVOICEGENIE_SECURITY_ENABLED: ${INVOICEGENIE_SECURITY_ENABLED:-true}
      INVOICEGENIE_SECURITY_MODE: ${INVOICEGENIE_SECURITY_MODE:-api-key}
      # SmallRye rejects empty strings for @ConfigProperty String — use "none" sentinel
      INVOICEGENIE_API_KEYS: ${INVOICEGENIE_API_KEYS:-none}
      INVOICEGENIE_JWT_SECRET: ${INVOICEGENIE_JWT_SECRET:-none}
      INVOICEGENIE_SECURITY_ALLOW_OPENAPI: ${INVOICEGENIE_SECURITY_ALLOW_OPENAPI:-false}
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/q/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://app:8080}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-InvoiceGenie AR}
      NEXT_PUBLIC_ALLOW_TENANT_OVERRIDE: ${NEXT_PUBLIC_ALLOW_TENANT_OVERRIDE:-false}
      NEXT_PUBLIC_DEFAULT_TENANT_ID: ${NEXT_PUBLIC_DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-}
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-invoicegenie}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
