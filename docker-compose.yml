version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/invoicegenie
      - QUARKUS_DATASOURCE_USERNAME=ar
      - QUARKUS_DATASOURCE_PASSWORD=ar
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ar
      - POSTGRES_PASSWORD=ar
      - POSTGRES_DB=invoicegenie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
