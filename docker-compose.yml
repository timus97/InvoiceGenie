version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/invoicegenie
      - QUARKUS_DATASOURCE_USERNAME=ar
      - QUARKUS_DATASOURCE_PASSWORD=ar
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://app:8080
      - NEXT_PUBLIC_APP_NAME=InvoiceGenie AR
      - NEXT_PUBLIC_ALLOW_TENANT_OVERRIDE=true
      - NEXT_PUBLIC_DEFAULT_TENANT_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ar
      - POSTGRES_PASSWORD=ar
      - POSTGRES_DB=invoicegenie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
