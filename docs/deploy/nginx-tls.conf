# TLS termination example (nginx) for InvoiceGenie
# Place certificates via your platform secrets; do not commit private keys.

upstream invoicegenie_api {
    server app:8080;
}

upstream invoicegenie_web {
    server web:3000;
}

server {
    listen 80;
    server_name ar.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ar.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # API
    location /api/ {
        proxy_pass http://invoicegenie_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /q/health {
        proxy_pass http://invoicegenie_api;
    }

    # Block OpenAPI/Swagger at the edge in production
    location /q/swagger-ui {
        return 404;
    }
    location /q/openapi {
        return 404;
    }

    # Web console
    location / {
        proxy_pass http://invoicegenie_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
